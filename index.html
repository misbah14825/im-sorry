<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

.page{
display:none;
}

.active{
display:block;
}

.container{
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:20px;
max-width:700px;
}

h1{
font-size:45px;
}

p{
font-size:20px;
}

button{
margin:10px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff4b6e;
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* Photo Gallery */

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* Sparkles */

.sparkle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:sparkle 3s linear infinite;
}

@keyframes sparkle{
0%{opacity:0; transform:translateY(0);}
50%{opacity:1;}
100%{opacity:0; transform:translateY(-100vh);}
}

</style>
</head>

<body>

<!-- PAGE 1 -->

<div class="page active" id="page1">
<div class="container">

<h1>I'm Sorry ❤️</h1>

<p>
I know I made a mistake.  
Hurting you was never my intention.
</p>

<button onclick="nextPage(2)">Please read this</button>

</div>
</div>

<!-- PAGE 2 -->

<div class="page" id="page2">
<div class="container">

<h1>You Mean Everything 💖</h1>

<p>
Our memories mean a lot to me.  
Here are some of my favorite moments with you.
</p>

<button onclick="nextPage(3)">See our memories</button>

</div>
</div>

<!-- PAGE 3 PHOTO GALLERY -->

<div class="page" id="page3">
<div class="container">

<h1>Our Beautiful Memories 📸</h1>

<div class="gallery">
<img src="image/20250417_115309.jpg" height="250vh" width="100px">
<img src="image/20250417_121121.jpg" height="250vh" width="20px">
<img src="image/20250419_165750.jpg" height="250vh" width="20px">

</div>

<br>

<button onclick="alert('You just made me the happiest person ❤️')">
Yes, I forgive you
</button>

<button onclick="alert('Thank you for forgiving me again ❤️')">
Yes, I forgive you again
</button>

</div>
</div>

<script>

function nextPage(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+page).classList.add("active");
}

/* Sparkles */

for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.animationDelay=Math.random()*3+"s";
document.body.appendChild(s);
}

</script>

</body>
</html>
